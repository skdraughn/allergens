name: Refresh restaurant data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 26

      - run: npm ci

      - name: Fetch official restaurant menus and allergen guides
        run: npm run scrape:restaurants -- --skip-raw=true --product-page-limit=25

      - run: npm run test:pipeline

      - run: npm run typecheck

      - uses: actions/upload-artifact@v4
        with:
          name: restaurant-data-run
          path: |
            src/data/generated/restaurants.generated.json
            data/scraped/latest-run.json

      - name: Push refreshed snapshot branch
        run: |
          if git diff --quiet -- src/data/generated/restaurants.generated.json data/scraped/latest-run.json; then
            echo "No restaurant data changes."
            exit 0
          fi

          git config user.name "allergy-app data bot"
          git config user.email "actions@github.com"
          git checkout -B bot/refresh-restaurant-data
          git add src/data/generated/restaurants.generated.json data/scraped/latest-run.json
          git commit -m "Refresh restaurant data"
          git push --force origin bot/refresh-restaurant-data
